services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,s3
      - S3_ASSETS_BUCKET=commercechat-assets
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - ./scripts/localstack-init:/etc/localstack/init/ready.d
      - localstack-data:/var/lib/localstack

volumes:
  localstack-data:
